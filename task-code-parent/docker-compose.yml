version: '3.8'

services:
  postgres:
    image: docker.1ms.run/library/postgres:16
    container_name: task-code-parent-postgres
    environment:
      POSTGRES_DB: task_code_parent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # 减少PostgreSQL使用的共享内存
      POSTGRES_SHARED_BUFFERS: 128MB
      # 减少PostgreSQL使用的工作内存
      POSTGRES_WORK_MEM: 4MB
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    # 添加资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          # 限制CPU使用
          cpus: '0.5'
          
  redis:
    image: docker.1ms.run/library/redis:alpine
    container_name: task-code-parent-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes --requirepass redis123
    # 添加资源限制
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'