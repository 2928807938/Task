<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义效果 -->
  <defs>
    <!-- 背景阴影 - 增强阴影效果 -->
    <filter id="baseShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.25" />
    </filter>
    
    <!-- 金属效果 -->
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="50%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    
    <!-- T字母的立体阴影效果 -->
    <filter id="letterShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur" />
      <feOffset in="blur" dx="0" dy="3" result="offsetBlur" />
      <feFlood flood-color="rgba(15, 23, 42, 0.35)" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="coloredShadow" />
      <feComposite in="SourceGraphic" in2="coloredShadow" operator="over" />
    </filter>
    
    <!-- 内部高光效果 -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9" />
      <stop offset="100%" stop-color="white" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- 微妙的背景纹理 -->
    <pattern id="subtlePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="100" fill="#60a5fa" />
      <circle cx="50" cy="50" r="40" fill="#3b82f6" opacity="0.4" />
    </pattern>
  </defs>
  
  <!-- 单一色彩背景 - 符合苹果设计风格的圆角矩形 -->
  <rect x="20" y="20" width="80" height="80" rx="18" fill="#60a5fa" filter="url(#baseShadow)" />
  
  <!-- T字母主体 - 金属效果，更加干净 -->
  <path 
    d="M38 42 L82 42 M60 42 L60 78" 
    stroke="url(#metalGradient)" 
    stroke-width="12" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    filter="url(#innerShadow)" 
  />
  
  <!-- 金属顶部亮光 -->
  <line x1="40" y1="37" x2="80" y2="37" stroke="white" stroke-width="1" opacity="0.7" />
  
  <!-- 点缀装饰 - 金属银色小圆点 -->
  <circle cx="82" cy="76" r="4" fill="url(#metalGradient)" stroke="#94a3b8" stroke-width="0.5" />
  
  <!-- 反光效果 - 左上角高光 -->
  <path d="M28 28 L50 28 L28 50 Z" fill="url(#shineGradient)" opacity="0.3" />
</svg>
